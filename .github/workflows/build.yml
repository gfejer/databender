name: Build Cross-Platform Apps
run-name: "Build by @${{ github.actor }} - ${{ github.event.head_commit.message }} (${{ github.event.head_commit.timestamp }})"

on:
  push:
    branches: [ main ]
    paths:
      - "**.py"
      - "**.ico"
      - "**.icns"
      - ".github/workflows/build.yml"
    
  workflow_dispatch: 

jobs:
# ARM MAC BUILD
  build-mac-arm:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14.3'

    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        pip install pillow numpy pyinstaller opencv-python-headless

    - name: Build App
      run: |
        python3 -OO -m PyInstaller --noconsole --windowed --icon=icon.icns --exclude-module matplotlib --exclude-module PyQt5 --exclude-module PyQt6 --exclude-module PySide2 --exclude-module PySide6 --exclude-module IPython --exclude-module sqlite3 --exclude-module pydoc --exclude-module setuptools --exclude-module curses databender.py
        cd dist
        zip -r ../databender_mac_arm.zip databender.app

    - name: Upload Mac Artifact
      uses: actions/upload-artifact@v6
      with:
        name: databender-mac-arm
        path: databender_mac_arm.zip

  # INTEL MAC BUILD
  build-mac-intel:
    runs-on: macos-26-intel
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14.3'

    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        pip install pillow numpy pyinstaller opencv-python-headless

    - name: Build App
      run: |
        python3 -OO -m PyInstaller --noconsole --windowed --icon=icon.icns --exclude-module matplotlib --exclude-module PyQt5 --exclude-module PyQt6 --exclude-module PySide2 --exclude-module PySide6 --exclude-module IPython --exclude-module sqlite3 --exclude-module pydoc --exclude-module setuptools --exclude-module curses databender.py
        cd dist
        zip -r ../databender_mac_intel.zip databender.app

    - name: Upload Mac Artifact
      uses: actions/upload-artifact@v6
      with:
        name: databender-mac-intel
        path: databender_mac_intel.zip

  # WINDOWS BUILD
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14.3'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pillow numpy pyinstaller opencv-python-headless

    - name: Build EXE
      run: python -OO -m PyInstaller --noconsole --windowed --onefile --icon=icon.ico --exclude-module matplotlib --exclude-module PyQt5 --exclude-module PyQt6 --exclude-module PySide2 --exclude-module PySide6 --exclude-module IPython --exclude-module sqlite3 --exclude-module pydoc --exclude-module setuptools --exclude-module curses databender.py

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v6  
      with:
        name: databender-win
        path: dist/*.exe

  # LINUX BUILD
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14.3'

    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        pip install pillow numpy pyinstaller opencv-python-headless

    - name: Build Linux
      run: python3 -OO -m PyInstaller --noconsole --onefile --exclude-module matplotlib --exclude-module PyQt5 --exclude-module PyQt6 --exclude-module PySide2 --exclude-module PySide6 --exclude-module IPython --exclude-module sqlite3 --exclude-module pydoc --exclude-module setuptools --exclude-module curses databender.py

    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v6
      with:
        name: databender-linux
        path: dist/databender